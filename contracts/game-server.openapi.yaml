openapi: 3.0.3
info:
  title: Game Designer Server API
  description: MVP API contract for slot-machine H5 mini-game backends with virtual credits and server-authoritative spin resolution.
  version: 0.2.0
  contact:
    name: Game Designer Team

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Session
    description: Player session and authentication
  - name: Profile
    description: Player profile management
  - name: Slot
    description: Slot machine configuration and spin resolution
  - name: Balance
    description: Virtual credit balance
  - name: SpinHistory
    description: Spin history records
  - name: Leaderboard
    description: Slot leaderboard ranked by highest virtual credit balance

paths:
  /session:
    post:
      operationId: createOrResumeSession
      tags: [Session]
      summary: Create a new player session or resume an existing one
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRequest'
      responses:
        '200':
          description: Session created or resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /profile:
    get:
      operationId: getPlayerProfile
      tags: [Profile]
      summary: Get the current player profile
      parameters:
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Player profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Missing or invalid session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Player profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      operationId: updatePlayerProfile
      tags: [Profile]
      summary: Update the current player profile
      parameters:
        - $ref: '#/components/parameters/SessionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /slot/config:
    get:
      operationId: getSlotConfig
      tags: [Slot]
      summary: Get slot machine configuration including reels, paylines, and wager limits
      parameters:
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Slot machine configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotConfigResponse'
        '401':
          description: Missing or invalid session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /balance:
    get:
      operationId: getBalance
      tags: [Balance]
      summary: Get current virtual credit balance
      parameters:
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Current virtual credit balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '401':
          description: Missing or invalid session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spin:
    post:
      operationId: spin
      tags: [Slot]
      summary: Request a server-authoritative spin with a virtual credit wager
      description: |
        Validates the wager, deducts credits, resolves reels, evaluates paylines,
        applies payout, and records the spin outcome. The server is authoritative
        for all spin resolution — the client must not calculate payouts locally.
      parameters:
        - $ref: '#/components/parameters/SessionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpinRequest'
      responses:
        '200':
          description: Spin resolved with reels, payline wins, payout, and updated balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpinResult'
        '400':
          description: Invalid wager or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spin/history:
    get:
      operationId: getSpinHistory
      tags: [SpinHistory]
      summary: Get spin history for the current player
      parameters:
        - $ref: '#/components/parameters/SessionToken'
        - name: limit
          in: query
          description: Maximum number of spin records to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Number of spin records to skip
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Spin history records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpinHistoryResponse'
        '401':
          description: Missing or invalid session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /leaderboard:
    get:
      operationId: getSlotLeaderboard
      tags: [Leaderboard]
      summary: Get slot leaderboard ranked by highest virtual credit balance
      parameters:
        - $ref: '#/components/parameters/SessionToken'
        - name: limit
          in: query
          description: Maximum number of entries to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: offset
          in: query
          description: Number of entries to skip
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Slot leaderboard entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotLeaderboardResponse'
        '401':
          description: Missing or invalid session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  parameters:
    SessionToken:
      name: X-Session-Token
      in: header
      required: true
      description: Player session token returned by createOrResumeSession
      schema:
        type: string
        minLength: 1

  schemas:
    SessionRequest:
      type: object
      required: [playerId]
      properties:
        playerId:
          type: string
          description: External player identifier from the H5 game platform
          minLength: 1
          maxLength: 128
        nickname:
          type: string
          description: Optional player display name
          maxLength: 64
        avatarUrl:
          type: string
          description: Optional player avatar URL
          maxLength: 512

    SessionResponse:
      type: object
      required: [sessionId, token, playerId, isNew]
      properties:
        sessionId:
          type: string
          description: Unique session identifier
        token:
          type: string
          description: Session token for subsequent API calls
        playerId:
          type: string
          description: Internal player identifier
        isNew:
          type: boolean
          description: Whether this is a new player (true) or a resumed session (false)
        expiresAt:
          type: string
          format: date-time
          description: Session expiration time

    ProfileResponse:
      type: object
      required: [playerId, nickname, createdAt, updatedAt]
      properties:
        playerId:
          type: string
        nickname:
          type: string
        avatarUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 64
        avatarUrl:
          type: string
          maxLength: 512

    SymbolDefinition:
      type: object
      required: [name, payoutMultiplier]
      properties:
        name:
          type: string
          description: Symbol identifier (e.g. Cherry, Seven, BAR)
        payoutMultiplier:
          type: integer
          description: Multiplier applied when this symbol fills a payline
          minimum: 0

    PaylineDefinition:
      type: object
      required: [id, positions]
      properties:
        id:
          type: integer
          description: Payline identifier
          minimum: 1
        positions:
          type: array
          description: Row positions for each reel column (0-based row index per reel)
          items:
            type: integer
            minimum: 0
          minItems: 3
          maxItems: 5

    SlotConfigResponse:
      type: object
      required: [reels, rows, paylines, symbols, minWager, maxWager, defaultBalance]
      properties:
        reels:
          type: integer
          description: Number of reel columns
          minimum: 3
          maximum: 5
        rows:
          type: integer
          description: Number of visible rows per reel
          minimum: 1
          maximum: 5
        paylines:
          type: array
          description: Active payline definitions
          items:
            $ref: '#/components/schemas/PaylineDefinition'
        symbols:
          type: array
          description: Available symbol definitions
          items:
            $ref: '#/components/schemas/SymbolDefinition'
        minWager:
          type: integer
          description: Minimum virtual credit wager per spin
          minimum: 1
        maxWager:
          type: integer
          description: Maximum virtual credit wager per spin
          minimum: 1
        defaultBalance:
          type: integer
          description: Starting virtual credit balance for new players
          minimum: 0

    BalanceResponse:
      type: object
      required: [balance]
      properties:
        balance:
          type: integer
          description: Current virtual credit balance
          minimum: 0

    SpinRequest:
      type: object
      required: [wager]
      properties:
        wager:
          type: integer
          description: Virtual credit wager for this spin
          minimum: 1

    ReelWindow:
      type: array
      description: Symbol grid displayed as rows x reels (outer array is rows, inner array is reel columns)
      items:
        type: array
        items:
          type: string
      minItems: 1

    PaylineWin:
      type: object
      required: [paylineId, symbol, count, payout]
      properties:
        paylineId:
          type: integer
          description: Payline identifier that triggered the win
        symbol:
          type: string
          description: Winning symbol name
        count:
          type: integer
          description: Number of consecutive matching symbols on this payline
          minimum: 2
        payout:
          type: integer
          description: Payout in virtual credits for this payline win
          minimum: 0

    SpinResult:
      type: object
      required: [reels, totalPayout, balance, spinId, wager]
      properties:
        spinId:
          type: string
          description: Unique spin record identifier
        wager:
          type: integer
          description: Wager amount deducted for this spin
        reels:
          $ref: '#/components/schemas/ReelWindow'
        paylineWins:
          type: array
          description: Payline wins for this spin (empty if no wins)
          items:
            $ref: '#/components/schemas/PaylineWin'
        totalPayout:
          type: integer
          description: Total payout in virtual credits (sum of all payline wins)
          minimum: 0
        balance:
          type: integer
          description: Virtual credit balance after this spin
          minimum: 0

    SpinHistoryEntry:
      type: object
      required: [spinId, wager, totalPayout, balance, reels, spunAt]
      properties:
        spinId:
          type: string
        wager:
          type: integer
        totalPayout:
          type: integer
        balance:
          type: integer
          description: Balance after this spin
        reels:
          $ref: '#/components/schemas/ReelWindow'
        paylineWins:
          type: array
          items:
            $ref: '#/components/schemas/PaylineWin'
        spunAt:
          type: string
          format: date-time

    SpinHistoryResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/SpinHistoryEntry'
        total:
          type: integer
          description: Total number of spin history records

    SlotLeaderboardEntry:
      type: object
      required: [rank, playerId, nickname, balance, updatedAt]
      properties:
        rank:
          type: integer
          description: Leaderboard position (1-based)
        playerId:
          type: string
        nickname:
          type: string
        balance:
          type: integer
          description: Highest virtual credit balance achieved
        updatedAt:
          type: string
          format: date-time

    SlotLeaderboardResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/SlotLeaderboardEntry'
        total:
          type: integer
          description: Total number of leaderboard entries

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code for agent triage
          enum:
            - INVALID_PARAMETERS
            - UNAUTHORIZED
            - NOT_FOUND
            - SESSION_EXPIRED
            - INSUFFICIENT_BALANCE
            - INTERNAL_ERROR
        details:
          type: object
          description: Additional error context
          additionalProperties: true
